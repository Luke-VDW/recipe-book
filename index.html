<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2d6a4f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Recipe Book" />
  <title>Recipe Book</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ═══ TOP BAR ═══ -->
  <header id="topbar">
    <button id="btn-back" class="icon-btn hidden" onclick="App.goBack()">&#8592;</button>
    <h1 id="topbar-title">📖 Recipe Book</h1>
    <button id="btn-sync" class="icon-btn" onclick="Data.syncDrive()" title="Sync with Google Drive">&#x21bb;</button>
  </header>

  <!-- ═══ VIEWS ═══ -->
  <main id="main">

    <!-- RECIPES LIST -->
    <section id="view-recipes" class="view active">
      <div class="search-bar">
        <input id="recipe-search" type="search" placeholder="Search recipes…" oninput="Recipes.filter()" />
        <select id="recipe-cat-filter" onchange="Recipes.filter()">
          <option value="">All categories</option>
          <option>Breakfast</option>
          <option>Lunch</option>
          <option>Dinner</option>
          <option>Snack</option>
          <option>Dessert</option>
          <option>Salad</option>
          <option>Soup</option>
          <option>Side</option>
        </select>
      </div>
      <div id="recipe-list" class="card-list"></div>
      <button class="fab" onclick="Recipes.openAddModal()">＋</button>
    </section>

    <!-- RECIPE DETAIL -->
    <section id="view-detail" class="view">
      <div id="detail-content"></div>
    </section>

    <!-- MEAL PLANNER -->
    <section id="view-planner" class="view">
      <div class="week-tabs">
        <button class="week-tab active" onclick="Planner.showWeek(1,this)">Week 1</button>
        <button class="week-tab" onclick="Planner.showWeek(2,this)">Week 2</button>
        <button class="week-tab" onclick="Planner.showWeek(3,this)">Week 3</button>
        <button class="week-tab" onclick="Planner.showWeek(4,this)">Week 4</button>
      </div>
      <div class="planner-filter-bar">
        <input id="planner-recipe-filter" type="search" placeholder="Filter recipes…"
          oninput="Planner.filterRecipes()" />
      </div>
      <div id="planner-grid"></div>
      <div class="planner-actions">
        <button id="btn-generate-shopping" class="btn-secondary" onclick="Planner.generateShoppingList()">🛒 Generate Shopping List</button>
      </div>
    </section>

    <!-- SHOPPING LIST -->
    <section id="view-shopping" class="view">
      <div class="section-header">
        <h2>Shopping List</h2>
        <button class="btn-small" onclick="Shopping.clearChecked()">Clear checked</button>
      </div>
      <div id="shopping-list"></div>
    </section>

    <!-- IMPORT -->
    <section id="view-import" class="view">
      <div class="search-bar">
        <input id="import-search" type="search" placeholder="Search Spoonacular…" />
        <button class="btn-primary" onclick="Importer.search()">Search</button>
      </div>
      <div id="import-key-notice" class="notice hidden">
        <p>⚙️ Add your Spoonacular API key in <strong>Settings</strong> to search recipes.</p>
      </div>
      <div id="import-results" class="card-list"></div>
    </section>

    <!-- SETTINGS -->
    <section id="view-settings" class="view">
      <div class="settings-group">
        <h3>Google Drive Sync</h3>
        <p class="hint">Stores your recipes in <code>RecipeBook_Data.json</code> on your Drive.</p>
        <div id="drive-status" class="status-badge">Not connected</div>
        <button class="btn-primary" onclick="Data.connectDrive()">Connect Google Drive</button>
        <button class="btn-secondary" onclick="Data.disconnectDrive()">Disconnect</button>
      </div>
      <div class="settings-group">
        <h3>Spoonacular API Key</h3>
        <p class="hint">Get a free key at <a href="https://spoonacular.com/food-api" target="_blank">spoonacular.com</a></p>
        <input id="spoon-key-input" type="password" placeholder="Paste API key here…" />
        <button class="btn-primary" onclick="Settings.saveSpoonKey()">Save Key</button>
      </div>
      <div class="settings-group">
        <h3>Data</h3>
        <button class="btn-secondary" onclick="Data.exportJSON()">⬇ Export JSON</button>
        <button class="btn-secondary" onclick="Data.importJSON()">⬆ Import JSON</button>
        <input id="import-file-input" type="file" accept=".json" class="hidden" onchange="Data.handleImportFile(event)" />
        <button class="btn-danger" onclick="Data.clearAll()">🗑 Clear all data</button>
      </div>
      <div class="settings-group">
        <p class="hint version">Recipe Book PWA v1.0</p>
      </div>
    </section>

  </main>

  <!-- ═══ BOTTOM NAV ═══ -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-view="recipes" onclick="App.nav('recipes',this)">
      <span class="nav-icon">📖</span>
      <span class="nav-label">Recipes</span>
    </button>
    <button class="nav-btn" data-view="planner" onclick="App.nav('planner',this)">
      <span class="nav-icon">🗓</span>
      <span class="nav-label">Planner</span>
    </button>
    <button class="nav-btn" data-view="shopping" onclick="App.nav('shopping',this)">
      <span class="nav-icon">🛒</span>
      <span class="nav-label">Shop</span>
    </button>
    <button class="nav-btn" data-view="import" onclick="App.nav('import',this)">
      <span class="nav-icon">🔍</span>
      <span class="nav-label">Import</span>
    </button>
    <button class="nav-btn" data-view="settings" onclick="App.nav('settings',this)">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Settings</span>
    </button>
  </nav>

  <!-- ═══ MODALS ═══ -->
  <div id="modal-overlay" class="hidden" onclick="App.closeModal(event)">
    <div id="modal-box" onclick="event.stopPropagation()">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Timer modal -->
  <div id="timer-modal" class="hidden">
    <div id="timer-box">
      <h3>⏱ Cooking Timer</h3>
      <div id="timer-display">00:00</div>
      <input id="timer-input" type="number" min="1" max="180" value="30" /> <span>min</span>
      <div class="timer-btns">
        <button class="btn-primary" onclick="Timer.start()">Start</button>
        <button class="btn-secondary" onclick="Timer.pause()">Pause</button>
        <button class="btn-danger" onclick="Timer.reset()">Reset</button>
        <button class="btn-secondary" onclick="Timer.close()">Close</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/recipes.js"></script>
  <script src="js/planner.js"></script>
  <script src="js/shopping.js"></script>
  <script src="js/spoonacular.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
